  rdp:
    # -- Enable RDP server
    enabled: true
    image: keeper/playground-rdp-xfce:latest
    # -- Root password (DEMO PLACEHOLDER - not a real credential)
    rootPassword: "DEMO-ONLY-rdp-r00t-GreatScott-88"
