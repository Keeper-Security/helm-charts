# They are intentionally fake and not used in any real system.
# Replace them with values from the Keeper Vault wizard output.
#
# To use: provision a gateway with "Create with example records" in the
# Keeper Vault, then set gateway.config with the resulting config.

demo:
  # -- Enable demo playground services
  enabled: false

  mysql:
    # -- Enable MySQL demo server
    enabled: true
    image: mysql/mysql-server:8.0
    # -- Root password (DEMO PLACEHOLDER - not a real credential)
    rootPassword: "DEMO-ONLY-r00t-n0t-real-42"
    # -- Database name
    database: "salesdb"
    # -- Application user
    user: "sqluser"
    # -- Application password (DEMO PLACEHOLDER - not a real credential)
    password: "DEMO-ONLY-sql-placeholder-1337"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  sshPassword:
    # -- Enable SSH server with password auth
    enabled: true
    image: keeper/playground-ssh:latest
    # -- SSH user
    user: "linuxuser"
