      targetPort: 2222
      protocol: TCP
      name: ssh
  selector:
    app.kubernetes.io/component: demo-ssh-key
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keeper-gateway.fullname" . }}-demo-ssh-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keeper-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-ssh-key
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: demo-ssh-key
      app.kubernetes.io/instance: {{ .Release.Name }}
