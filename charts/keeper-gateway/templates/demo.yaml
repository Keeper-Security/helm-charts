{{/*
Demo / Playground Services
These deploy sample containers for testing gateway connections.
Service names match the hostnames used by the Keeper Vault demo wizard
so that PAM records resolve correctly.
*/}}
{{- if .Values.demo.enabled }}

{{/* ================================================================ */}}
{{/* MySQL Database                                                   */}}
{{/* Hostname: db-mysql-1  Port: 3306                                 */}}
{{/* ================================================================ */}}
{{- if .Values.demo.mysql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: db-mysql-1
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keeper-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-mysql
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
      name: mysql
  selector:
    app.kubernetes.io/component: demo-mysql
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keeper-gateway.fullname" . }}-demo-mysql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keeper-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: demo-mysql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: demo-mysql
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mysql
          image: {{ .Values.demo.mysql.image }}
          env:
            - name: MYSQL_ROOT_HOST
              value: "%"
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.demo.mysql.rootPassword | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.demo.mysql.database | quote }}
            - name: MYSQL_USER
              value: {{ .Values.demo.mysql.user | quote }}
            - name: MYSQL_PASSWORD
              value: {{ .Values.demo.mysql.password | quote }}
          ports:
            - containerPort: 3306
          resources:
            {{- toYaml .Values.demo.mysql.resources | nindent 12 }}
{{- end }}

---
{{/* ================================================================ */}}
{{/* SSH Server (Password Authentication)                             */}}
{{/* Hostname: server-ssh-with-pwd-1  Port: 2222                      */}}
{{/* ================================================================ */}}
{{- if .Values.demo.sshPassword.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: server-ssh-with-pwd-1
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keeper-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-ssh-pwd
spec:
  type: ClusterIP
  ports:
    - port: 2222
      targetPort: 2222
      protocol: TCP
      name: ssh
  selector:
    app.kubernetes.io/component: demo-ssh-pwd
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keeper-gateway.fullname" . }}-demo-ssh-pwd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keeper-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-ssh-pwd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: demo-ssh-pwd
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: demo-ssh-pwd
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: ssh
          image: {{ .Values.demo.sshPassword.image }}
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Los_Angeles"
            - name: SUDO_ACCESS
              value: "true"
            - name: PASSWORD_ACCESS
              value: "true"
            - name: USER_NAME
              value: {{ .Values.demo.sshPassword.user | quote }}
            - name: USER_PASSWORD
              value: {{ .Values.demo.sshPassword.password | quote }}
          ports:
            - containerPort: 2222
          resources:
            {{- toYaml .Values.demo.sshPassword.resources | nindent 12 }}
{{- end }}

---
