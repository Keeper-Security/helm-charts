{{- if .Values.healthCheck.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "keeper-gateway.fullname" . }}
  labels:
    {{- include "keeper-gateway.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.sessionAffinity }}
  sessionAffinity: {{ .Values.sessionAffinity }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "keeper-gateway.selectorLabels" . | nindent 4 }}
{{- end }}
