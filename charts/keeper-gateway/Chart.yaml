apiVersion: v2
name: keeper-gateway
description: Keeper PAM Gateway - Remote access, secret rotation, and discovery for Keeper Security
type: application
version: 0.2.0
appVersion: "1.7.6"
kubeVersion: ">=1.25.0-0"
home: https://www.keepersecurity.com
icon: https://keepersecurity.com/vault/images/keeper_icons/icon_rounded_256.png
sources:
  - https://github.com/Keeper-Security/helm-charts
maintainers:
  - name: Keeper Security
    email: pam@keepersecurity.com
    url: https://www.keepersecurity.com
keywords:
  - keeper
  - pam
  - gateway
  - remote-access
  - rdp
  - ssh
  - vnc
  - secret-rotation
  - discovery
  - security
  - privileged-access
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: MIT
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.keeper.io/en/keeperpam/privileged-access-manager/getting-started/gateways
    - name: Docker Hub
      url: https://hub.docker.com/r/keeper/gateway
    - name: Support
      url: https://www.keepersecurity.com/support.html
  artifacthub.io/changes: |
    - kind: changed
      description: "Probes now use exec (keeper-gateway health-check CLI) instead of tcpSocket for reliable health checking"
    - kind: changed
      description: "Security context with SYS_ADMIN, SYS_CHROOT, SETUID, SETGID capabilities and Unconfined seccomp for CEF/RBI support"
    - kind: changed
      description: "AppArmor set to unconfined via pod annotation (K8s <1.30 compatible) for CEF namespace isolation"
    - kind: changed
      description: "Health check binds to 127.0.0.1 (exec probes run inside container, more secure)"
    - kind: changed
      description: "Increased default resources: 4Gi memory limit (was 2Gi), 1Gi request (was 512Mi), 4 CPU limit (was 2)"
    - kind: changed
      description: "Increased default /dev/shm to 2Gi (was 256Mi) for RBI/Chromium sessions"
    - kind: added
      description: "/etc/guacamole emptyDir volume for guacd autofill rules configuration"
    - kind: added
      description: "Security hardening documentation for AppArmor on Debian/Ubuntu nodes"
