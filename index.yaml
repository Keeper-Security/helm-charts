apiVersion: v1
entries:
  keeper-gateway:
  - annotations:
      artifacthub.io/category: security
      artifacthub.io/changes: |
        - kind: added
          description: KeeperAI threat detection configuration with support for OpenAI, Anthropic, Azure, GCP, and AWS Bedrock
        - kind: added
          description: Memory-based resource management controls (connection limiting when memory is low)
        - kind: added
          description: Separate log level controls for gateway service and guacd daemon
        - kind: added
          description: Demo playground services for testing (MySQL, SSH, VNC, RDP)
        - kind: added
          description: MIT license, .helmignore files, and Helm test
        - kind: fixed
          description: Health probes use tcpSocket to avoid 401 from non-localhost requests
        - kind: fixed
          description: Set both LOG_LEVEL (guacd) and KEEPER_GATEWAY_LOG_LEVEL (gateway) in configmap
        - kind: changed
          description: Session recordings are encrypted (AES-256-GCM) and streamed to Keeper in real time
        - kind: changed
          description: Use Helm repository as only install method (removed OCI references)
        - kind: changed
          description: Improved documentation with examples, explanatory text, and configuration reference
      artifacthub.io/license: MIT
      artifacthub.io/links: |
        - name: Documentation
          url: https://docs.keeper.io/en/keeperpam/privileged-access-manager/getting-started/gateways
        - name: Docker Hub
          url: https://hub.docker.com/r/keeper/gateway
        - name: Support
          url: https://www.keepersecurity.com/support.html
      artifacthub.io/operator: "false"
      artifacthub.io/prerelease: "false"
