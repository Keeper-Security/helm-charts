# Helm Charts Release Workflow
#
# WORKFLOW LOGIC:
#   - Pull Request: lint and validate charts
#   - Push to main: detect changed charts, package, and publish
#
# PUBLISHED ARTIFACTS:
#   - Helm OCI: oci://registry-1.docker.io/keeper/<chart-name>
#   - Helm HTTP: https://keeper-security.github.io/helm-charts
#   - ArtifactHub: auto-syncs from GitHub Pages
#
# REQUIRED SECRETS (in prod environment):
#   - DOCKERHUB_USERNAME
#   - DOCKERHUB_TOKEN

name: Release Charts

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
  pull_request:
    branches: [main]
    paths:
      - "charts/**"

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint charts
        run: |
          for chart in charts/*/; do
            if [ -f "${chart}/Chart.yaml" ]; then
              echo "Linting ${chart}..."
              helm lint "${chart}"
            fi
          done

      - name: Validate templates
        run: |
          for chart in charts/*/; do
            if [ -f "${chart}/Chart.yaml" ]; then
              echo "Validating ${chart}..."
              helm template test "${chart}" > /dev/null
            fi
          done

  release:
    name: Release Charts
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push'
    environment: prod
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login to Docker Hub for Helm OCI
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Detect changed charts
        id: changed
        run: |
          CHANGED_CHARTS=""
          for chart in charts/*/; do
            if [ -f "${chart}/Chart.yaml" ]; then
              chart_name=$(basename "${chart}")
              if git diff --name-only HEAD~1 HEAD -- "${chart}" | grep -q .; then
                CHANGED_CHARTS="${CHANGED_CHARTS} ${chart_name}"
              fi
            fi
          done
          echo "charts=${CHANGED_CHARTS}" >> ${GITHUB_OUTPUT}
          echo "Changed charts: ${CHANGED_CHARTS}"

      - name: Package and push changed charts
        if: steps.changed.outputs.charts != ''
        run: |
          mkdir -p .helm-packages
          for chart_name in ${{ steps.changed.outputs.charts }}; do
            chart_dir="charts/${chart_name}"
            echo "=== Packaging ${chart_name} ==="
            helm package "${chart_dir}" -d .helm-packages

            version=$(grep '^version:' "${chart_dir}/Chart.yaml" | awk '{print $2}')
            echo "=== Pushing ${chart_name} v${version} to OCI ==="
            helm push ".helm-packages/${chart_name}-${version}.tgz" oci://registry-1.docker.io/keeper || true
          done

      - name: Checkout gh-pages branch
        if: steps.changed.outputs.charts != ''
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repository index
        if: steps.changed.outputs.charts != ''
        run: |
          cp .helm-packages/*.tgz gh-pages/ 2>/dev/null || true
          cd gh-pages
          helm repo index . --url https://keeper-security.github.io/helm-charts --merge index.yaml 2>/dev/null || helm repo index . --url https://keeper-security.github.io/helm-charts

      - name: Push to gh-pages
        if: steps.changed.outputs.charts != ''
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update Helm repository index"
          git push
